<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Spotify Callback</title>
</head>
<body>
<p>Logging in...</p>

<script>
  const params = window.location.search;
  const appUrl = "headunitapp://" + params;
  window.location.href = appUrl;
  setTimeout(() => {
    document.body.innerHTML = `
      <p>如果没有自动跳转，请点击：</p>
      <a href="${appUrl}">打开 App</a>
    `;
  }, 1500);
</script>
</body>
</html>
